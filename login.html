<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIKAT4D — Admin Login</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <link href="https://images.linkcdn.cloud/V2/507/favicon/favicon-1888287302.png" rel="icon" type="image/png"/>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Barlow', sans-serif; }
        body {
            background: #f4f6f9; /* Background utama abu-abu sangat muda bersih */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        body::before {
            content: ""; 
            position: absolute; 
            inset: 0; 
            background: linear-gradient(135deg, rgba(16, 76, 42, 0.05) 0%, rgba(50, 205, 50, 0.05) 100%); 
            z-index: 1;
        }
        .login-card {
            background: #ffffff; /* Card putih bersih */
            border: 1px solid #e0e0e0;
            border-top: 5px solid #104c2a; /* Aksen garis atas hijau tua */
            border-radius: 12px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            z-index: 2;
            box-shadow: 0 10px 30px rgba(16, 76, 42, 0.08); /* Bayangan lembut bertema hijau */
            text-align: center;
            transition: transform 0.3s ease;
        }
        .login-card:hover {
            transform: translateY(-2px);
        }
        .logo img { height: 45px; margin-bottom: 25px; filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.1)); }
        h2 { 
            color: #104c2a; /* Teks hijau tua premium */
            margin-bottom: 25px; 
            font-size: 22px; 
            font-weight: 700; 
            letter-spacing: 0.5px;
        }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { color: #4a5568; display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; }
        input {
            width: 100%; 
            padding: 12px; 
            background: #ffffff; 
            border: 1px solid #cbd5e0;
            color: #2d3748; 
            border-radius: 8px; 
            font-size: 14px; 
            transition: all 0.3s ease;
        }
        input:focus { 
            border-color: #32cd32; /* Border hijau muda saat fokus */
            box-shadow: 0 0 0 3px rgba(50, 205, 50, 0.15);
            outline: none; 
        }
        button {
            width: 100%; 
            padding: 13px; 
            background: #104c2a; /* Tombol utama hijau tua solid */
            color: #ffffff;
            border: none; 
            border-radius: 8px; 
            font-weight: 700; 
            font-size: 15px;
            cursor: pointer; 
            margin-top: 10px; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(16, 76, 42, 0.2);
        }
        button:hover { 
            background: #32cd32; /* Efek hover berubah ke hijau muda segar */
            box-shadow: 0 4px 12px rgba(50, 205, 50, 0.3);
        }
        button:disabled {
            background: #a0aec0;
            cursor: not-allowed;
            box-shadow: none;
        }
        .error-msg { 
            color: #e53e3e; 
            font-size: 13px; 
            margin-top: 15px; 
            display: none; 
            padding: 10px;
            background: #fff5f5;
            border-radius: 6px;
            border: 1px solid #fed7d7;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">
        <img src="https://i.imgur.com/DuwlIfJ.png" alt="Logo">
    </div>
    <h2>PANEL KONTROL ADMIN</h2>

    <form id="loginForm">
        <div class="form-group">
            <label>Email Admin</label>
            <input type="email" id="email" placeholder="admin@pikat4d.com" required autocomplete="username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" id="btnLogin">MASUK PANEL</button>
        <div class="error-msg" id="errorMsg">Email atau password salah!</div>
    </form>
</div>

<script>
    // ═══════════════════════════════════════════════════════
    // SUPABASE CLIENT — DIRECT (NO NETLIFY)
    // ═══════════════════════════════════════════════════════
    const { createClient } = supabase;
    const db = createClient(
        'https://hboyqdswhmdyxykpvxri.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhib3lxZHN3aG1keXh5a3B2eHJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMDU0MDUsImV4cCI6MjA5MjU4MTQwNX0.uy6RRXZknbo3sPok6TvYrThi6yBWUjQg263-7nOvnLQ'
    );

    // ═══════════════════════════════════════════════════════
    // CEK SESI — jika sudah login langsung masuk admin
    // ═══════════════════════════════════════════════════════
    (async () => {
        const { data: { session } } = await db.auth.getSession();
        if (session) {
            window.location.href = 'admin.html';
        }
    })();

    // ═══════════════════════════════════════════════════════
    // FORM SUBMIT — LOGIN DENGAN SUPABASE AUTH
    // ═══════════════════════════════════════════════════════
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn      = document.getElementById('btnLogin');
        const err      = document.getElementById('errorMsg');

        btn.disabled    = true;
        btn.textContent = 'Memverifikasi...';
        err.style.display = 'none';

        try {
            const { data, error } = await db.auth.signInWithPassword({ email, password });

            if (error) throw error;

            // Login sukses — sesi otomatis disimpan oleh Supabase SDK
            err.textContent      = '✅ Login Sukses! Mengalihkan...';
            err.style.color      = '#104c2a';
            err.style.background = '#f0fff4';
            err.style.borderColor = '#c6f6d5';
            err.style.display    = 'block';

            setTimeout(() => {
                window.location.href = 'admin.html';
            }, 1000);

        } catch (error) {
            // Terjemahkan pesan error umum Supabase ke bahasa Indonesia
            let pesanError = '❌ Gagal Masuk: ';
            if (error.message.includes('Invalid login credentials')) {
                pesanError += 'Email atau password salah!';
            } else if (error.message.includes('Email not confirmed')) {
                pesanError += 'Email belum dikonfirmasi. Cek inbox Anda.';
            } else if (error.message.includes('Too many requests')) {
                pesanError += 'Terlalu banyak percobaan. Coba lagi nanti.';
            } else {
                pesanError += error.message;
            }

            err.textContent   = pesanError;
            err.style.color   = '#e53e3e';
            err.style.background = '#fff5f5';
            err.style.borderColor = '#fed7d7';
            err.style.display = 'block';
            btn.disabled      = false;
            btn.textContent   = 'MASUK PANEL';
        }
    });
</script>

</body>
</html>
